<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, follow">
  <title>404 - Səhifə tapılmadı | MotoBaku Academy</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #161616;
      --panel: #222;
      --text: #f5f5f5;
      --muted: #b8b8b8;
      --accent: #e63619;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    main {
      width: min(560px, 100%);
      padding: 32px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: var(--panel);
      text-align: center;
    }

    .code {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 72px;
      line-height: 1;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.6;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      text-decoration: none;
    }

    a:focus,
    a:hover {
      background: #ff4122;
    }

    .brand-mark {
      display: block;
      width: 48px;
      height: 48px;
      object-fit: contain;
      margin: 24px auto 0;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <main>
    <p class="code">404</p>
    <h1>Səhifə tapılmadı</h1>
    <p>Axtardığınız səhifə silinmiş, köçürülmüş və ya ünvan səhv yazılmış ola bilər.</p>
    <a href="/">Ana səhifəyə qayıt</a>
    <img class="brand-mark" src="/assets/images/logo-256w.webp" alt="MotoBaku Academy">
  </main>
</body>
</html>
